services:
  - type: web
    name: meetingmind-api

    runtime: python

    rootDir: backend

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: GROQ_API_KEY
        sync: false

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_KEY
        sync: false

      - key: MODEL_NAME
        value: llama-3.1-8b-instant